name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: pip install -r requirements.txt pyinstaller
      - run: python build.py --dist
      - uses: actions/upload-artifact@v4
        with:
          name: ITStrategyAssessment-macOS
          path: dist/ITStrategyAssessment.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: pip install -r requirements.txt pyinstaller
      - run: python build.py --dist
      - uses: actions/upload-artifact@v4
        with:
          name: ITStrategyAssessment-Windows
          path: dist/ITStrategyAssessment.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ITStrategyAssessment-macOS
          path: artifacts/macos
      - uses: actions/download-artifact@v4
        with:
          name: ITStrategyAssessment-Windows
          path: artifacts/windows
      - run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv artifacts/macos/ITStrategyAssessment.zip "ITStrategyAssessment-macOS-${TAG}.zip"
          mv artifacts/windows/ITStrategyAssessment.zip "ITStrategyAssessment-Windows-${TAG}.zip"
      - uses: softprops/action-gh-release@v2
        with:
          name: "IT Strategy Assessment Tool ${{ github.ref_name }}"
          files: |
            ITStrategyAssessment-macOS-*.zip
            ITStrategyAssessment-Windows-*.zip
