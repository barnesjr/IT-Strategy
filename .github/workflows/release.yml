name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: ITStrategyAssessment-macos
          - os: windows-latest
            platform: windows
            artifact: ITStrategyAssessment-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build executable (macOS)
        if: matrix.platform == 'macos'
        run: |
          python -m PyInstaller \
            --distpath dist \
            --workpath build_temp \
            assessment-tool-macos.spec

      - name: Build executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          python -m PyInstaller `
            --distpath dist `
            --workpath build_temp `
            assessment-tool-windows.spec

      - name: Assemble distribution (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp dist/assessment-tool dist/${{ matrix.artifact }}/
          chmod +x dist/${{ matrix.artifact }}/assessment-tool
          cp -r framework dist/${{ matrix.artifact }}/
          if [ -d templates ]; then cp -r templates dist/${{ matrix.artifact }}/; else mkdir dist/${{ matrix.artifact }}/templates; fi
          if [ -f README.txt ]; then cp README.txt dist/${{ matrix.artifact }}/; fi
          mkdir -p dist/${{ matrix.artifact }}/exports
          cd dist && zip -r ${{ matrix.artifact }}-${{ steps.tag.outputs.version }}.zip ${{ matrix.artifact }}

      - name: Assemble distribution (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact }}"
          Copy-Item "dist/assessment-tool.exe" "dist/${{ matrix.artifact }}/"
          Copy-Item -Recurse "framework" "dist/${{ matrix.artifact }}/framework"
          if (Test-Path "templates") { Copy-Item -Recurse "templates" "dist/${{ matrix.artifact }}/templates" } else { New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact }}/templates" }
          if (Test-Path "README.txt") { Copy-Item "README.txt" "dist/${{ matrix.artifact }}/" }
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact }}/exports"
          Compress-Archive -Path "dist/${{ matrix.artifact }}" -DestinationPath "dist/${{ matrix.artifact }}-${{ steps.tag.outputs.version }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}-${{ steps.tag.outputs.version }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: IT Strategy Assessment Tool ${{ steps.tag.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/ITStrategyAssessment-macos/ITStrategyAssessment-macos-${{ steps.tag.outputs.version }}.zip
            artifacts/ITStrategyAssessment-windows/ITStrategyAssessment-windows-${{ steps.tag.outputs.version }}.zip
